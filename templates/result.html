<!DOCTYPE html>
<html>
<head>
    <title>Generated MCQs</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
    #topNav {
        transform: translateY(-30px);
        opacity: 0;
        animation: navDrop 0.8s ease forwards;
    }

    @keyframes navDrop {
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }

    .navbar-brand {
        animation: glowPulse 2.5s infinite ease-in-out;
    }

    @keyframes glowPulse {
        0%, 100% { text-shadow: 0 0 0 rgba(255,255,255,0); }
        50% { text-shadow: 0 0 12px rgba(255,255,255,0.35); }
    }
    </style>
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark px-4 py-3 shadow-sm" id="topNav" style="background: linear-gradient(90deg, #0f172a, #1e293b, #0b1324);">
    <div class="d-flex flex-column">
        <span class="navbar-brand fw-bold fs-4 mb-0">GEM AI</span>
        <small class="text-light opacity-75">Generated Exam MCQs using AI</small>
    </div>
    <div class="d-flex align-items-center gap-3">
    <span class="text-light small opacity-75">Upload • Generate • Learn</span>

    <button onclick="toggleTheme()" class="btn btn-sm btn-light rounded-3">
        🌙
    </button>
</div>
</nav>

<div class="container mt-5">

    <!-- Back Button -->
    <div class="mb-3">
        <a href="/" class="btn btn-outline-dark rounded-4">⬅ Back</a>
    </div>
    {% if mcqs %}
    <div class="card shadow-lg p-4 mt-4 rounded-4 border-0">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="d-flex align-items-center gap-2">
                <h5 class="mb-0 fw-bold">Generated MCQs</h5>
                <button class="btn btn-success btn-sm" onclick="downloadPDF()">📥 Download</button>
                <button class="btn btn-danger btn-sm ms-2" onclick="regenerateWeak()">
                    🔁 Practice Weak Areas
                </button>
            </div>
            <small class="text-muted">Click “Reveal Answer” under each question</small>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-3">

            <div>
                <span class="badge bg-primary">Score: <span id="score">0</span></span>
                <span class="badge bg-success ms-2">XP: <span id="xp">0</span></span>
                <span class="badge bg-warning ms-2">Level: <span id="level">1</span></span>
                <div class="mt-2">
                    <small id="performanceMsg"></small>
                </div>
            </div>

            <div>
                ⏱️ Time: <span id="timer">0</span>s
            </div>

        </div>

        <div class="progress mb-3">
            <div id="progressBar" class="progress-bar" style="width:0%"></div>
        </div>
        <div class="mt-3">
                <h6>⚠️ Weak Areas:</h6>
                <ul id="weakList"></ul>
            </div>
        <!-- MCQs will be rendered here -->
        <div id="mcqContainer" style="max-height: 70vh; overflow-y: auto;"></div>


        <!-- Hidden raw text -->
        <pre id="rawMcqs" style="display:none;">{{ mcqs | safe }}</pre>
        <hr class="my-4">
        

            
    </div>
    {% endif %}
    <script>
    // Show loading animation when generating
    document.addEventListener("DOMContentLoaded", () => {
        const form = document.getElementById("mcqForm");
        const loading = document.getElementById("loadingScreen");

        if (form) {
            form.addEventListener("submit", () => {
                loading.style.display = "flex";
            });
        }
    });
    function regenerateWeak() {
        const topics = Object.keys(weakAreas).slice(0, 3).join(", ");

        if (!topics) {
            alert("No weak areas yet!");
            return;
        }

        fetch("/", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: `topic=${topics}&count=5&difficulty=Medium`
        })
        .then(res => res.text())
        .then(html => {
            document.open();
            document.write(html);
            document.close();
        });
    }
    function renderMcqs() {
        const raw = document.getElementById("rawMcqs");
        const container = document.getElementById("mcqContainer");

        if (!raw || !container) return;

        const text = raw.innerText ? raw.innerText.trim() : "";
        if (!text) {
            container.innerHTML = "<p class='text-danger'>⚠️ No MCQs received from backend</p>";
            return;
        }
        // Split questions by Q1, Q2, Q3...
        const parts = text.split(/\n(?=Q\d+\b)/g);

        container.innerHTML = "";
        totalQuestions = parts.filter(q => /^Q\d+/i.test(q.trim())).length;
        parts.forEach((q, index) => {
            q = q.trim();
            if (!q) return;

            // ✅ Skip non-question blocks like "Source used"
            if (!/^Q\d+\b/i.test(q)) return;


            // Extract Answer + Explanation block
            let answerBlockMatch = q.match(/Answer:.*(\nExplanation:.*)?/is);
            let answerText = answerBlockMatch ? answerBlockMatch[0].trim() : "Answer: Not found";

            // Remove Answer + Explanation from question block
            let questionText = q.replace(/Answer:.*(\nExplanation:.*)?/is, "").trim();


            // Card UI
            const card = document.createElement("div");
            card.className = "bg-dark text-light p-4 rounded-4 mb-3";

            card.innerHTML = `
                <div style="white-space: pre-wrap; font-size: 15px;">
                    ${formatOptions(questionText, index)}
                </div>
                <button class="btn btn-outline-light btn-sm mt-3 rounded-4"
                    onclick="toggleOneAnswer(${index})"
                    id="btn-${index}">
                    👁️ Reveal Answer
                </button>

                <button class="btn btn-warning btn-sm mt-3 ms-2 rounded-4"
                    onclick="explainQuestion(\`${questionText.replace(/`/g, "\\`")}\`, \`${answerText.replace(/`/g, "\\`")}\`)">
                    🤖 Explain
                </button>
                <button class="btn btn-info btn-sm mt-3 ms-2 rounded-4"
                    onclick="readAloud(\`${questionText.replace(/`/g, "\\`")}\`)">
                    🔊 Read Aloud
                </button>
                <button class="btn btn-primary btn-sm mt-3 ms-2 rounded-4"
                    onclick="explainHindi(\`${questionText.replace(/`/g, "\\`")}\`, \`${answerText.replace(/`/g, "\\`")}\`)">
                    🇮🇳 Explain in Hindi
                </button>
                <button class="btn btn-danger btn-sm mt-3 ms-2 rounded-4"
                    onclick="window.speechSynthesis.cancel()">
                    ⛔ Stop Audio
                </button>
                <button class="btn btn-outline-info btn-sm mt-3 ms-2 rounded-4"
                    onclick="toggleLanguage(${index})"
                    id="lang-${index}">
                    🌐 EN → HI
                </button>
                <div class="mt-3 p-3 rounded-4 bg-black"
                    style="display:none; white-space: pre-wrap;"
                    id="ans-${index}">
                    ${escapeHtml(answerText)}
                </div>
            `;

            container.appendChild(card);
        });
        document.getElementById("performanceMsg").innerText = "Start answering to see performance...";
    }
    function explainHindi(question, answer) {

    const fullContext = question + "\n\n" + answer;

    addMessage("🇮🇳 Hindi explanation chahiye", "user");

    const loading = addMessage("🤖 Soch raha hai...", "bot");
    animateTyping(loading);

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: "Explain this in simple Hindi for a student",
            context: fullContext
        })
    })
    .then(res => res.json())
    .then(data => {
        clearInterval(loading.dataset.interval);

        typeEffect(loading, data.reply);

        // 🔊 Speak Hindi answer
        speakHindi(data.reply);
    });
}
    function speakHindi(text) {
        window.speechSynthesis.cancel();

        const speech = new SpeechSynthesisUtterance(text);
        speech.lang = "hi-IN";
        speech.rate = 0.9;
        speech.pitch = 1;

        const voices = window.speechSynthesis.getVoices();
        const hindiVoice = voices.find(v => v.lang.includes("hi"));

        if (hindiVoice) {
            speech.voice = hindiVoice;
        }

        window.speechSynthesis.speak(speech);
    }
   function readAloud(text) {
        window.speechSynthesis.cancel(); // stop previous speech

        const speech = new SpeechSynthesisUtterance(text);

        speech.lang = "en-US";
        speech.rate = 0.9;
        speech.pitch = 1;
        speech.volume = 1;

        window.speechSynthesis.speak(speech);
    }
    // Toggle one answer only
    function toggleOneAnswer(i) {
        const ans = document.getElementById("ans-" + i);
        const btn = document.getElementById("btn-" + i);

        if (!ans || !btn) return;

        if (ans.style.display === "none") {
            ans.style.display = "block";
            btn.innerText = "🙈 Hide Answer";
        } else {
            ans.style.display = "none";
            btn.innerText = "👁️ Reveal Answer";
        }
    }

    // Prevent HTML breaking if model returns < > etc.
    function escapeHtml(text) {
        return text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
    }
    function formatOptions(text, qIndex) {
        const lines = text.split("\n");

        return lines.map(line => {
            if (/^[A-D]\)/.test(line.trim())) {
                const option = line.trim().charAt(0);

                return `
                    <div onclick="selectOption(${qIndex}, '${option}')"
                        class="option p-2 mt-1 rounded"
                        style="cursor:pointer; border:1px solid #555;">
                        ${escapeHtml(line)}
                    </div>
                `;
            }
            return `<div>${escapeHtml(line)}</div>`;
        }).join("");
    }
    // Auto render on load
    document.addEventListener("DOMContentLoaded", renderMcqs);
    // Press Enter to send message
document.addEventListener("DOMContentLoaded", () => {
    const input = document.getElementById("chat-input");

    if (input) {
        input.addEventListener("keydown", function (e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    }
});
function addMessage(text, sender) {
    const chatBox = document.getElementById("chat-box");

    const bubble = document.createElement("div");
    bubble.style.maxWidth = "75%";
    bubble.style.padding = "10px 14px";
    bubble.style.borderRadius = "12px";
    bubble.style.whiteSpace = "pre-wrap";

    if (sender === "user") {
        bubble.style.alignSelf = "flex-end";
        bubble.style.background = "linear-gradient(135deg,#0d6efd,#3b82f6)";
        bubble.style.color = "white";
    } else {
        bubble.style.alignSelf = "flex-start";
        bubble.style.background = "rgba(255,255,255,0.2)";
        bubble.style.color = "white";
    }

        chatBox.appendChild(bubble);
        chatBox.scrollTop = chatBox.scrollHeight;

        return bubble;
    }

function sendMessage() {
    const input = document.getElementById("chat-input");
    const message = input.value.trim();

    if (!message) return;

    addMessage(message, "user");

    const loading = addMessage("🤖 typing...", "bot");
    animateTyping(loading);

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: message,
            context: document.getElementById("rawMcqs").innerText
        })
    })
    .then(res => res.json())
   .then(data => {
        const popup = document.getElementById("chatPopup");

        if (popup.style.display === "none") {
            playSound();
            document.getElementById("chatBadge").style.display = "block";
        }

        clearInterval(loading.dataset.interval);

        // ✅ Show reply
        let fullReply = data.reply;

        // ✅ Add references if available
        if (data.sources && data.sources.length > 0) {
            fullReply += "\n\n🔗 Sources:\n";

            data.sources.forEach((src, i) => {
                fullReply += `${i + 1}. ${src}\n`;
            });
        }

        typeEffect(loading, fullReply);
    });

    input.value = "";
}
function animateTyping(element) {
    let dots = 0;
    const interval = setInterval(() => {
        dots = (dots + 1) % 4;
        element.innerText = "🤖 typing" + ".".repeat(dots);
    }, 500);

    element.dataset.interval = interval;
}

function typeEffect(element, text) {
    let i = 0;
    element.innerText = "";

    const speed = 15;

    function typing() {
        if (i < text.length) {
            element.innerText += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }

    typing();
}
function explainQuestion(question, answer) {

    const fullContext = question + "\n\n" + answer;

    const popup = document.getElementById("chatPopup");
    popup.style.display = "block";
    popup.style.transform = "scale(1)";
    popup.style.opacity = "1";

    addMessage("Explain this question 👇", "user");

    const loading = addMessage("🤖 typing...", "bot");
    animateTyping(loading);

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: "Explain this question in detail",
            context: fullContext
        })
    })
    .then(res => res.json())
    .then(data => {
        clearInterval(loading.dataset.interval);
        typeEffect(loading, data.reply);
    });
}
// 🎤 Voice Input
function startVoice() {
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

    recognition.lang = "en-US";

    recognition.onstart = () => {
        addMessage("🎤 Listening...", "bot");
    };

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        document.getElementById("chat-input").value = transcript;
    };

    recognition.onerror = () => {
        addMessage("❌ Voice error. Try again.", "bot");
    };

    recognition.start();
}

// 📥 Download MCQs
function downloadPDF() {
    const { jsPDF } = window.jspdf;

    const doc = new jsPDF();

    const text = document.getElementById("rawMcqs").innerText;

    const lines = doc.splitTextToSize(text, 180);

    doc.text(lines, 10, 10);

    doc.save("MCQs.pdf");
}
let score = 0;
let xp = 0;
let level = 1;
let answered = 0;
let totalQuestions = 0;
let startTime = Date.now();
let weakAreas = {};
let questionLanguage = {};

    function trackWeakArea(questionText) {
        const keywords = questionText
            .replace(/[^a-zA-Z0-9 ]/g, "") // clean symbols
            .split(" ")
            .slice(0, 8)
            .join(" ")
            .trim();

        if (!keywords) return;

        weakAreas[keywords] = (weakAreas[keywords] || 0) + 1;

        // ✅ FORCE UI update immediately
        updateUI();
    }
    function toggleLanguage(index) {
    const card = document.getElementById("ans-" + index).closest(".bg-dark");
    const questionDiv = card.querySelector("div[style*='white-space']");

    if (!questionDiv) return;

    let isHindi = questionLanguage[index] === "hi";

    if (!isHindi) {
        // Convert EN → HI
        translateQuestion(index, questionDiv.innerText, "hi");
        questionLanguage[index] = "hi";
        document.getElementById("lang-" + index).innerText = "🌐 HI → EN";
    } else {
        // Convert HI → EN
        translateQuestion(index, questionDiv.innerText, "en");
        questionLanguage[index] = "en";
        document.getElementById("lang-" + index).innerText = "🌐 EN → HI";
    }
}
function selectOption(qIndex, selected) {

    const answerDiv = document.getElementById("ans-" + qIndex);
    if (!answerDiv) return;

    const correctMatch = answerDiv.innerText.match(/Answer:\s*([A-D])/i);
    if (!correctMatch) return;

    const correct = correctMatch[1];

    const card = document.getElementById("ans-" + qIndex).closest(".bg-dark");
    const options = card.querySelectorAll(".option");
    options.forEach(opt => {
        opt.style.pointerEvents = "none";
    });

    if (selected === correct) {
        score += 1;
        xp += 10;
        highlightOption(qIndex, selected, "green");
    }  else {
    highlightOption(qIndex, selected, "red");
    highlightOption(qIndex, correct, "green");

    const questionText = card.innerText.split("\n")[0];
    trackWeakArea(questionText);
}

    answered++;

    updateUI();
}

function highlightOption(qIndex, option, color) {
    const card = document.getElementById("ans-" + qIndex).closest(".bg-dark");
    const options = card.querySelectorAll(".option");
    options.forEach(opt => {
        if (opt.innerText.trim().startsWith(option)) {
            opt.style.background = color;
            opt.style.color = "white";
        }
    });
}

function updateUI() {
    // Track wrong topics
    
    document.getElementById("score").innerText = score;
    document.getElementById("xp").innerText = xp;

    level = Math.floor(xp / 50) + 1;
    document.getElementById("level").innerText = level;

    const progress = (answered / totalQuestions) * 100;
    document.getElementById("progressBar").style.width = progress + "%";

    const weakList = document.getElementById("weakList");
    if (weakList) {
        weakList.innerHTML = "";

       const sorted = Object.entries(weakAreas)
        .sort((a, b) => b[1] - a[1]) // highest first
        .slice(0, 5); // show top 5

    sorted.forEach(([topic]) => {
        const li = document.createElement("li");
        li.innerText = topic;
        weakList.appendChild(li);
    });
    if (Object.keys(weakAreas).length === 0) {
        weakList.innerHTML = "<li>No weak areas yet</li>";
    }
    }
    const msg = document.getElementById("performanceMsg");

    if (msg) {
        if (score === totalQuestions) {
            msg.innerText = "🔥 Excellent! Perfect Score!";
        } else if (score > totalQuestions / 2) {
            msg.innerText = "👍 Good job! Keep improving.";
        } else {
            msg.innerText = "⚠️ Needs improvement. Focus on weak areas.";
        }
    }
}
setInterval(() => {
    const seconds = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById("timer").innerText = seconds;
}, 1000);
function minimizeChat() {
    const popup = document.getElementById("chatPopup");
    const content = document.getElementById("chatContent");

    popup.style.height = "60px";
    content.style.display = "none";

    isMinimized = true;
    isMaximized = false;
}

function maximizeChat() {
    const popup = document.getElementById("chatPopup");
    const content = document.getElementById("chatContent");

    content.style.display = "block";

    if (!isMaximized) {
        popup.style.width = "500px";
        popup.style.height = "80vh";
        popup.style.bottom = "20px";
    } else {
        popup.style.width = "320px";
        popup.style.height = "auto";
        popup.style.bottom = "90px";
    }

    isMaximized = !isMaximized;
    isMinimized = false;
}
function toggleChat() {
    const popup = document.getElementById("chatPopup");
    const badge = document.getElementById("chatBadge");

    if (popup.style.display === "none") {
        popup.style.display = "block";

        setTimeout(() => {
            popup.style.transform = "scale(1)";
            popup.style.opacity = "1";
        }, 10);

        badge.style.display = "none";
    } else {
        popup.style.transform = "scale(0.8)";
        popup.style.opacity = "0";

        setTimeout(() => {
            popup.style.display = "none";
        }, 300);
    }
}

function playSound() {
    const audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
    audio.play();
}
let isMaximized = false;
let isMinimized = false;
let isDragging = false;
let offsetX, offsetY;


document.addEventListener("DOMContentLoaded", () => {
    const popup = document.getElementById("chatPopup");
    const header = document.getElementById("chatHeader");

    let isDragging = false;
    let offsetX, offsetY;

    header.addEventListener("mousedown", (e) => {
        isDragging = true;
        offsetX = e.clientX - popup.offsetLeft;
        offsetY = e.clientY - popup.offsetTop;
    });

    document.addEventListener("mousemove", (e) => {
        if (isDragging) {
            popup.style.left = (e.clientX - offsetX) + "px";
            popup.style.top = (e.clientY - offsetY) + "px";
            popup.style.right = "auto";
            popup.style.bottom = "auto";
        }
    });

    document.addEventListener("mouseup", () => {
        isDragging = false;
    });
});

document.addEventListener("mousemove", (e) => {
    if (isDragging) {
        popup.style.left = (e.clientX - offsetX) + "px";
        popup.style.top = (e.clientY - offsetY) + "px";
        popup.style.right = "auto";
        popup.style.bottom = "auto";
    }
});

document.addEventListener("mouseup", () => {
    isDragging = false;
});
    </script>

    <script>
darkMode = localStorage.getItem("theme") !== "light";

// Apply theme on load
document.addEventListener("DOMContentLoaded", () => {
    applyTheme();
});

function toggleTheme() {
    darkMode = !darkMode;
    localStorage.setItem("theme", darkMode ? "dark" : "light");
    applyTheme();
}

function applyTheme() {
    const body = document.body;
    const cards = document.querySelectorAll(".card");
    const navbar = document.querySelector(".navbar");
    const btn = document.querySelector("button[onclick='toggleTheme()']");

    if (darkMode) {
        body.classList.remove("bg-light");
        body.style.background = "#0b1324";
        body.style.color = "white";

        cards.forEach(c => {
            c.style.background = "#1e293b";
            c.style.color = "white";
        });

        if (navbar) navbar.style.background = "linear-gradient(90deg, #020617, #0f172a)";

        if (btn) btn.innerText = "☀️";

    } else {
        body.classList.add("bg-light");
        body.style.background = "";
        body.style.color = "";

        cards.forEach(c => {
            c.style.background = "white";
            c.style.color = "black";
        });

        if (navbar) navbar.style.background = "linear-gradient(90deg, #0f172a, #1e293b, #0b1324)";

        if (btn) btn.innerText = "🌙";
    }
}
</script>
</body>
</html>
